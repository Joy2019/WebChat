<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no, email=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>过程控制实验AI智能助手</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="top-title-bar">
        <img
          class="top-logo"
          src="/assets/logo.png"
          alt="logo"
        />
        <h1 class="top-title-text">过程控制实验AI智能助手</h1>
      </header>

      <div class="app-body">
        <div id="sidebar-backdrop" class="sidebar-backdrop" aria-hidden="true"></div>
        <aside class="sidebar">
          <div class="sidebar-header">
            <div class="brand">会话列表</div>
            <button id="new-session-icon-btn" class="ghost sidebar-toggle-btn new-session-icon-btn" title="新增会话">＋</button>
            <button id="sidebar-toggle-btn" class="ghost sidebar-toggle-btn" title="收起/展开会话栏">☰</button>
          </div>
          <div class="sidebar-actions">
            <button id="new-session-btn" class="ghost new-session-btn">新增会话</button>
            <button id="clear-sessions-btn" class="ghost clear-sessions-btn">一键清空</button>
          </div>
          <div id="session-list" class="session-list"></div>
        </aside>

        <div class="main">
          <header class="app-header">
            <button
              id="mobile-menu-btn"
              type="button"
              class="ghost mobile-menu-btn"
              aria-label="打开会话列表"
              title="会话列表"
            >☰</button>
            <div class="app-header-main">
              <h2 id="session-title">AI智能助手</h2>
              <span class="sub">7X24小时智能伴学</span>
            </div>
            <div class="app-header-actions">
              <button id="theme-btn" class="ghost theme-btn" title="切换主题">🌙 暗色</button>
            </div>
          </header>

          <main class="chat-container">
            <button id="clear-current-btn" class="ghost clear-current-btn" title="清空当前会话">🧹</button>
            <div id="chat-window" class="chat-window"></div>

            <div class="input-panel">
              <!-- 粘贴/选择图片预览区 -->
              <div id="paste-preview" class="paste-preview" style="display:none;">
                <img id="paste-thumb" alt="待发送图片" />
                <button id="paste-clear" class="paste-clear" title="移除图片">✕</button>
              </div>

              <div class="input-row">
                <textarea
                  id="user-input"
                  placeholder="输入问题，可直接粘贴图片…"
                  rows="2"
                ></textarea>
                <div class="input-actions">
                  <button
                    type="button"
                    id="voice-input-btn"
                    class="voice-input-btn"
                    title="按住说话"
                    aria-label="按住说话"
                  >🎤</button>
                  <button type="button" id="upload-btn" class="upload-trigger" title="添加图片">
                    <span class="upload-icon">+</span>
                  </button>
                  <button id="send-btn">发送</button>
                </div>
                <input
                  type="file"
                  id="file-input"
                  accept="image/jpeg,image/png,image/gif,image/webp,image/*"
                  hidden
                />
              </div>
            </div>
          </main>
        </div>

        <div id="links-backdrop" class="links-backdrop" aria-hidden="true"></div>
        <aside class="rightbar">
          <div class="rightbar-header">
            <span>第三方链接</span>
            <button id="links-drawer-close" type="button" class="ghost links-drawer-close" aria-label="关闭">✕</button>
          </div>
          <div id="link-list" class="link-list"></div>
        </aside>
      </div>
    </div>

    <div id="image-modal" class="image-modal">
      <img id="image-modal-img" alt="预览图片" />
    </div>

    <script src="app.js"></script>
  </body>
</html>
